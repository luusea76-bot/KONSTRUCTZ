        }

        window.addEventListener('error', function (event) {
          showAppError(event.message || 'Unknown script error.');
        });
        window.addEventListener('unhandledrejection', function (event) {
          showAppError((event.reason && (event.reason.message || event.reason.toString())) || 'Unknown promise error.');
        });
        window.setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.children.length === 0) {
            showAppError('The React app did not mount. This usually means the browser is connected to a stale Vite port or a module failed to load.');
          }
        }, 3500);
      })();
